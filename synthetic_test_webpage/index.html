<html>
<head>
<link rel="stylesheet" type="text/css" href="css_files/style.css">

</head>
<body>
<hr class="test_separator">

<div class=image-container>
<img src="plots/gabor_tests/spatial_frequencies_ach/SSIM.png" alt="SSIM" />
<img src="plots/gabor_tests/spatial_frequencies_ach/MS-SSIM.png" alt="MS-SSIM" />
<img src="plots/gabor_tests/spatial_frequencies_ach/VIFp.png" alt="VIFp" />
<img src="plots/gabor_tests/spatial_frequencies_ach/VIF.png" alt="VIF" />
<img src="plots/gabor_tests/spatial_frequencies_ach/IW-SSIM.png" alt="IW-SSIM" />
</div>
<hr class="test_separator">
<h2>Gabor Patch Spatial Frequency RG Test</h2>
<p> <p>See the test image <a href=gabor_patch_spatial_frequency_rg_test.html>gallery</a>.</p> </p>
<div class=image-container>
<img src="plots/gabor_tests/spatial_frequencies_rg/SSIM.png" alt="SSIM" />
<img src="plots/gabor_tests/spatial_frequencies_rg/MS-SSIM.png" alt="MS-SSIM" />
<img src="plots/gabor_tests/spatial_frequencies_rg/VIFp.png" alt="VIFp" />
<img src="plots/gabor_tests/spatial_frequencies_rg/VIF.png" alt="VIF" />
<img src="plots/gabor_tests/spatial_frequencies_rg/IW-SSIM.png" alt="IW-SSIM" />
</div>
<hr class="test_separator">
<h2>Gabor Patch Spatial Frequency YV Test</h2>
<p> <p>See the test image <a href=gabor_patch_spatial_frequency_yv_test.html>gallery</a>.</p> </p>
<div class=image-container>
<img src="plots/gabor_tests/spatial_frequencies_yv/SSIM.png" alt="SSIM" />
<img src="plots/gabor_tests/spatial_frequencies_yv/MS-SSIM.png" alt="MS-SSIM" />
<img src="plots/gabor_tests/spatial_frequencies_yv/VIFp.png" alt="VIFp" />
<img src="plots/gabor_tests/spatial_frequencies_yv/VIF.png" alt="VIF" />
<img src="plots/gabor_tests/spatial_frequencies_yv/IW-SSIM.png" alt="IW-SSIM" />
</div>


<script type="text/javascript">



    // Select all images with the 'toggle-image' class

    const images = document.querySelectorAll('.toggle-image');



    // Add event listeners to each image for mouse down and mouse up events

    images.forEach((image) => {

        // Store the original and alternate image URLs from the dataset attributes

        const originalSrc = image.dataset.original;

        const alternateSrc = image.dataset.alternate;



        // When the user clicks (mouse down), change the image to the alternate

        image.addEventListener('mousedown', () => {

            image.src = alternateSrc;

        });



        // When the user releases the click (mouse up), revert back to the original image

        image.addEventListener('mouseup', () => {

            image.src = originalSrc;

        });



        // Also revert to the original image if the user moves the mouse out of the image while holding the click

        image.addEventListener('mouseleave', () => {

            image.src = originalSrc;

        });

    });



    // Select all video with the 'toggle-video' class

    const videos = document.querySelectorAll('.toggle-video');



    // Add event listeners to each image for mouse down and mouse up events

    videos.forEach((video) => {

        // Store the original and alternate image URLs from the dataset attributes

        const originalSrc = video.dataset.original;

        const alternateSrc = video.dataset.alternate;



        // When the user clicks (mouse down), change the image to the alternate

        video.addEventListener('mousedown', () => {

            video.src = alternateSrc;

            video.loop = true;

            video.load();

            video.play();

        });



        // When the user releases the click (mouse up), revert back to the original image

        video.addEventListener('mouseup', () => {

            video.src = originalSrc;

            video.loop = true;

            video.load();

            video.play();

        });



        // Also revert to the original image if the user moves the mouse out of the image while holding the click

        video.addEventListener('mouseleave', () => {

            video.src = originalSrc;

            video.loop = true;

            video.load();

            video.play();

        });

    });



</script>

    
</body>
</html>
